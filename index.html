<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ソフトテニス 前衛ポジション</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --omni-green: #1e3a2f;
            --line-white: rgba(255, 255, 255, 0.9);
            --ball-red: #ff4757;
            --player-yellow: #eccc68;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: #f8fafc;
            font-family: -apple-system, sans-serif;
            overflow: hidden; touch-action: none;
            display: flex; flex-direction: column; align-items: center;
        }

        #ui-layer {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; padding: 30px 20px; box-sizing: border-box;
            z-index: 10;
        }

        .label { font-size: 11px; font-weight: 600; letter-spacing: 0.05em; opacity: 0.7; pointer-events: auto; }

        canvas {
            margin-top: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border-radius: 4px;
            touch-action: none;
        }

        .controls-right {
            position: absolute; right: 10px; top: 40%;
            transform: translateY(-50%); pointer-events: auto;
            display: flex; flex-direction: column; align-items: center;
        }

        input[type=range].vertical {
            appearance: slider-vertical; width: 10px; height: 200px;
            background: rgba(255,255,255,0.1); border-radius: 10px;
        }

        .bottom-panel {
            width: 90%; background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px); padding: 12px;
            border-radius: 16px; pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 25px;
        }

        .slider-group { margin: 8px 0; }
        input[type=range] { width: 100%; accent-color: var(--player-yellow); }
        .val { color: var(--player-yellow); font-weight: bold; float: right; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="label" style="text-align: center;">打点をドラッグ</div>
    
    <div class="controls-right">
        <span class="label" style="margin-bottom:5px;">前衛の位置</span>
        <input type="range" id="depthSlider" class="vertical" min="0" max="1" step="0.01" value="0.7">
    </div>

    <div class="bottom-panel">
        <div class="slider-group">
            <div class="label">打球範囲 (左) <span id="leftVal" class="val">1.0x</span></div>
            <input type="range" id="leftSlider" min="0" max="2" step="0.01" value="1.0">
        </div>
        <div class="slider-group">
            <div class="label">打球範囲 (右) <span id="rightVal" class="val">1.0x</span></div>
            <input type="range" id="rightSlider" min="0" max="2" step="0.01" value="1.0">
        </div>
    </div>
</div>

<canvas id="mainCanvas"></canvas>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const depthSlider = document.getElementById('depthSlider');
    const leftSlider = document.getElementById('leftSlider');
    const rightSlider = document.getElementById('rightSlider');

    const ratio = 1.6; 
    let cProps = {};
    let ballPos = { x: 0.8, y: 0.15 }; 
    let isDragging = false;

    function resize() {
        const w = window.innerWidth * 0.9;
        canvas.width = w;
        canvas.height = w * ratio;
        calculateCourtProps();
        draw();
    }

    function calculateCourtProps() {
        const w = canvas.width;
        const h = canvas.height;
        const padX = w * 0.08;
        const padY = h * 0.08;
        const cw = w - (padX * 2);
        const sPad = cw * 0.13;

        cProps = {
            width: w, height: h,
            left: padX, right: w - padX,
            top: padY, bottom: h - padY,
            netY: h / 2,
            sLeft: padX + sPad, sRight: w - padX - sPad,
            cMarkX: w / 2,
            cMarkY: h - padY * 0.5
        };
    }

    function drawCourt() {
        const grad = ctx.createRadialGradient(cProps.width/2, cProps.height/2, 0, cProps.width/2, cProps.height/2, cProps.height);
        grad.addColorStop(0, '#2d5a3f');
        grad.addColorStop(1, '#1e3a2f');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, cProps.width, cProps.height);

        ctx.strokeStyle = "rgba(255, 255, 255, 0.9)";
        ctx.lineWidth = 2.5;
        ctx.strokeRect(cProps.left, cProps.top, cProps.right - cProps.left, cProps.bottom - cProps.top);
        
        ctx.beginPath();
        ctx.moveTo(cProps.sLeft, cProps.top); ctx.lineTo(cProps.sLeft, cProps.bottom);
        ctx.moveTo(cProps.sRight, cProps.top); ctx.lineTo(cProps.sRight, cProps.bottom);
        ctx.stroke();

        ctx.beginPath();
        ctx.lineWidth = 4;
        ctx.moveTo(0, cProps.netY); ctx.lineTo(cProps.width, cProps.netY);
        ctx.stroke();

        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(cProps.sLeft, cProps.height*0.28); ctx.lineTo(cProps.sRight, cProps.height*0.28);
        ctx.moveTo(cProps.sLeft, cProps.height*0.72); ctx.lineTo(cProps.sRight, cProps.height*0.72);
        ctx.moveTo(cProps.width/2, cProps.height*0.28); ctx.lineTo(cProps.width/2, cProps.height*0.72);
        ctx.stroke();
    }

    function draw() {
        const w = canvas.width;
        const h = canvas.height;
        ctx.clearRect(0, 0, w, h);
        drawCourt();

        const bX = ballPos.x * w;
        const bY = ballPos.y * h;

        // --- 左右個別の守備範囲計算 ---
        const leftFactor = parseFloat(leftSlider.value);
        const rightFactor = parseFloat(rightSlider.value);

        // 自陣センターからサイドラインまでの幅
        const halfCourtWidth = cProps.sRight - cProps.cMarkX;

        // 各辺のターゲットX座標を計算
        // 1.0x のとき、ちょうど自陣のサイドラインを指す
        const targetLeftX = cProps.cMarkX - (halfCourtWidth * leftFactor);
        const targetRightX = cProps.cMarkX + (halfCourtWidth * rightFactor);

        // 描画：守備範囲（扇形）
        ctx.fillStyle = "rgba(255, 71, 87, 0.25)";
        ctx.beginPath();
        ctx.moveTo(bX, bY);
        ctx.lineTo(targetLeftX, cProps.bottom);
        ctx.lineTo(targetRightX, cProps.bottom);
        ctx.fill();

        // 描画：セオリーライン
        ctx.setLineDash([8, 8]);
        ctx.strokeStyle = "rgba(255,255,255,0.4)";
        ctx.beginPath();
        ctx.moveTo(bX, bY);
        ctx.lineTo(cProps.cMarkX, cProps.cMarkY);
        ctx.stroke();
        ctx.setLineDash([]);

        // 前衛の位置計算
        const depth = parseFloat(depthSlider.value);
        const vY = cProps.netY + (cProps.height * 0.25 * (1-depth));
        const t = (vY - bY) / (cProps.cMarkY - bY);
        const vX = bX + t * (cProps.cMarkX - bX);

        // 立体感
        ctx.shadowBlur = 15; ctx.shadowColor = "black";
        ctx.fillStyle = "#eccc68";
        ctx.beginPath(); ctx.arc(vX, vY, 14, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.stroke();

        ctx.shadowBlur = 0;
        ctx.fillStyle = "#ff4757";
        ctx.beginPath(); ctx.arc(bX, bY, 16, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.stroke();
    }

    // イベント
    canvas.addEventListener('touchstart', (e) => {
        const rect = canvas.getBoundingClientRect();
        const tx = e.touches[0].clientX - rect.left;
        const ty = e.touches[0].clientY - rect.top;
        if(Math.hypot(tx - ballPos.x*canvas.width, ty - ballPos.y*canvas.height) < 40) isDragging = true;
    });

    window.addEventListener('touchmove', (e) => {
        if(!isDragging) return;
        const rect = canvas.getBoundingClientRect();
        ballPos.x = (e.touches[0].clientX - rect.left) / canvas.width;
        ballPos.y = (e.touches[0].clientY - rect.top) / canvas.height;
        ballPos.x = Math.max(0.05, Math.min(0.95, ballPos.x));
        ballPos.y = Math.max(0.05, Math.min(0.48, ballPos.y));
        draw();
    });

    window.addEventListener('touchend', () => isDragging = false);
    [depthSlider, leftSlider, rightSlider].forEach(s => s.addEventListener('input', (e) => {
        if(e.target.id === 'leftSlider') document.getElementById('leftVal').innerText = e.target.value + 'x';
        if(e.target.id === 'rightSlider') document.getElementById('rightVal').innerText = e.target.value + 'x';
        draw();
    }));

    window.addEventListener('resize', resize);
    window.onload = resize;
</script>
</body>
</html>
