<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>前衛ポジション シミュレーション</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --player-yellow: #eccc68;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: #f8fafc;
            font-family: -apple-system, sans-serif;
            overflow: hidden; touch-action: none;
            display: flex; flex-direction: column; height: 100vh;
        }

        #header {
            padding: 15px 0;
            text-align: center;
            background: rgba(30, 41, 59, 0.8);
            flex-shrink: 0;
            z-index: 20;
        }
        h1 { margin: 0; font-size: 16px; font-weight: bold; }

        /* コートエリア */
        #canvas-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background-color: var(--bg-dark);
            overflow: hidden;
        }

        canvas {
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            border-radius: 4px;
        }

        /* ネット距離スライダー（右側） */
        .controls-right {
            position: absolute; right: 10px; top: 50%;
            transform: translateY(-50%);
            display: flex; flex-direction: column; align-items: center;
            pointer-events: auto;
            z-index: 15;
        }
        input[type=range].vertical {
            appearance: slider-vertical; width: 12px; height: 180px;
            background: rgba(255,255,255,0.1); border-radius: 10px;
        }

        /* 下部操作パネル：ここで余白を制御 */
        #bottom-controls {
            background: var(--panel-bg);
            border-top: 1px solid rgba(255,255,255,0.2);
            flex-shrink: 0;
            /* 50pxの余白 + iPhoneのセーフエリアを確保 */
            padding: 25px 20px calc(50px + env(safe-area-inset-bottom, 0px)) 20px;
            z-index: 20;
        }

        .slider-wrapper {
            max-width: 500px; margin: 0 auto;
        }

        .label-row {
            display: flex; justify-content: space-between; margin-bottom: 12px;
        }
        .label { font-size: 13px; font-weight: 600; opacity: 0.9; }
        .val { color: var(--player-yellow); font-weight: bold; font-size: 14px; }

        input[type=range] { 
            width: 100%; height: 12px; border-radius: 6px;
            accent-color: var(--player-yellow);
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="header">
    <h1>前衛ポジション シミュレーション</h1>
</div>

<div id="canvas-container">
    <canvas id="mainCanvas"></canvas>
    
    <div class="controls-right">
        <span class="label" style="writing-mode: vertical-rl; margin-bottom:10px; font-size:11px;">ネット距離</span>
        <input type="range" id="depthSlider" class="vertical" min="0" max="1" step="0.01" value="0.7">
    </div>
</div>

<div id="bottom-controls">
    <div class="slider-wrapper">
        <div class="label-row">
            <span class="label">守備範囲（右へ動かすと狭まる）</span>
            <span id="rangeVal" class="val">標準</span>
        </div>
        <input type="range" id="rangeSlider" min="0" max="1" step="0.01" value="0.5">
    </div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const depthSlider = document.getElementById('depthSlider');
    const rangeSlider = document.getElementById('rangeSlider');

    const ratio = 1.4; 
    let cProps = {};
    let ballPos = { x: 0.8, y: 0.18 }; 
    let isDragging = false;

    function resize() {
        const container = document.getElementById('canvas-container');
        // コンテナの90%程度のサイズで描画
        const availableW = container.clientWidth * 0.92;
        const availableH = container.clientHeight * 0.92;
        
        let w = availableW;
        let h = w * ratio;
        
        if (h > availableH) {
            h = availableH;
            w = h / ratio;
        }

        canvas.width = w;
        canvas.height = h;
        calculateCourtProps();
        draw();
    }
