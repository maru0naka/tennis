<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>前衛ポジション シミュレーション</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --omni-green: #1e3a2f;
            --line-white: rgba(255, 255, 255, 0.9);
            --ball-red: #ff4757;
            --player-yellow: #eccc68;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: #f8fafc;
            font-family: -apple-system, "Helvetica Neue", sans-serif;
            overflow: hidden; touch-action: none;
            display: flex; flex-direction: column; align-items: center;
        }

        /* タイトルエリア */
        #header {
            width: 100%;
            padding: 15px 0;
            text-align: center;
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        h1 { margin: 0; font-size: 18px; font-weight: bold; letter-spacing: 0.05em; }

        #ui-layer {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; padding: 80px 20px 40px 20px; box-sizing: border-box;
            z-index: 10;
        }

        .label { font-size: 11px; font-weight: 600; letter-spacing: 0.05em; opacity: 0.7; pointer-events: auto; }

        canvas {
            margin-top: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border-radius: 4px;
            touch-action: none;
        }

        .controls-right {
            position: absolute; right: 10px; top: 45%;
            transform: translateY(-50%); pointer-events: auto;
            display: flex; flex-direction: column; align-items: center;
        }

        input[type=range].vertical {
            appearance: slider-vertical; width: 10px; height: 180px;
            background: rgba(255,255,255,0.1); border-radius: 10px;
        }

        .bottom-panel {
            width: 90%; background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px); padding: 15px;
            border-radius: 16px; pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }

        .slider-group { margin: 5px 0; }
        input[type=range] { width: 100%; accent-color: var(--player-yellow); }
        .val { color: var(--player-yellow); font-weight: bold; float: right; }
    </style>
</head>
<body>

<div id="header">
    <h1>前衛ポジション シミュレーション</h1>
</div>

<div id="ui-layer">
    <div class="controls-right">
        <span class="label" style="margin-bottom:5px;">ネットからの距離</span>
        <input type="range" id="depthSlider" class="vertical" min="0" max="1" step="0.01" value="0.7">
    </div>

    <div class="bottom-panel">
        <div class="slider-group">
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <span class="label">守備範囲 (右へ動かすと狭まる)</span>
                <span id="rangeVal" class="val">標準</span>
            </div>
            <input type="range" id="rangeSlider" min="0" max="1" step="0.01" value="0.5">
        </div>
    </div>
</div>

<canvas id="mainCanvas"></canvas>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const depthSlider = document.getElementById('depthSlider');
    const rangeSlider = document.getElementById('rangeSlider');

    const ratio = 1.45; 
    let cProps = {};
    let ballPos = { x: 0.8, y: 0.18 }; 
    let isDragging = false;

    function resize() {
        const w = window.innerWidth * 0.88;
        canvas.width = w;
        canvas.height = w * ratio;
        calculateCourtProps();
        draw();
    }

    function calculateCourtProps() {
        const w = canvas.width;
        const h = canvas.height;
        const padX = w * 0.08;
        const padY = h * 0.1;
        const cw = w - (padX * 2);
        const sPad = cw * 0.13;

        cProps = {
            width: w, height: h,
            left: padX, right: w - padX,
            top: padY, bottom: h - padY,
            netY: h / 2,
            sLeft: padX + sPad, sRight: w - padX - sPad,
            cMarkX: w / 2,
            cMarkY: h - padY * 0.5
        };
    }

    function drawCourt() {
        const grad = ctx.createRadialGradient(cProps.width/2, cProps.height/2, 0, cProps.width/2, cProps.height/2, cProps.height);
        grad.addColorStop(0, '#2d5a3f');
        grad.addColorStop(1, '#1e3a2f');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, cProps.width, cProps.height);

        ctx.strokeStyle = "rgba(255, 255, 255, 0.9)";
        ctx.lineWidth = 2.5;
        ctx.strokeRect(cProps.left, cProps.top, cProps.right - cProps.left, cProps.bottom - cProps.top);
        
        ctx.beginPath();
        ctx.moveTo(cProps.sLeft, cProps.top); ctx.lineTo(cProps.sLeft, cProps.bottom);
        ctx.moveTo(cProps.sRight, cProps.top); ctx.lineTo(cProps.sRight, cProps.bottom);
        ctx.stroke();

        ctx.beginPath();
        ctx.lineWidth = 4;
        ctx.moveTo(0, cProps.netY); ctx.lineTo(cProps.width, cProps.netY);
        ctx.stroke();

        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(cProps.sLeft, hPos(0.28)); ctx.lineTo(cProps.sRight, hPos(0.28));
        ctx.moveTo(cProps.sLeft, hPos(0.72)); ctx.lineTo(cProps.sRight, hPos(0.72));
        ctx.moveTo(cProps.width/2, hPos(0.28)); ctx.lineTo(cProps.width/2, hPos(0.72));
        ctx.stroke();
    }
    function hPos(p) { return cProps.height * p; }

    function draw() {
        const w = canvas.width;
        const h = canvas.height;
        ctx.clearRect(0, 0, w, h);
        drawCourt();

        const bX = ballPos.x * w;
        const bY = ballPos.y * h;

        // --- 守備範囲の計算 ---
        // スライダーが右(1.0)に行くほど narrowFactor が小さくなり、範囲が狭まる
        const rangeInput = parseFloat(rangeSlider.value);
        const narrowFactor = 1.6 - (rangeInput * 1.2); // 1.6(広) 〜 0.4(狭)
        
        const halfCourtWidth = cProps.sRight - cProps.cMarkX;
        const targetLeftX = cProps.cMarkX - (halfCourtWidth * narrowFactor);
        const targetRightX = cProps.cMarkX + (halfCourtWidth * narrowFactor);

        // 描画：守備範囲（扇形）
        ctx.fillStyle = "rgba(255, 71, 87, 0.25)";
        ctx.beginPath();
        ctx.moveTo(bX, bY);
        ctx.lineTo(targetLeftX, cProps.bottom);
        ctx.lineTo(targetRightX, cProps.bottom);
        ctx.fill();

        // 描画：セオリーライン
        ctx.setLineDash([8, 8]);
        ctx.strokeStyle = "rgba(255,255,255,0.4)";
        ctx.beginPath();
        ctx.moveTo(bX, bY);
        ctx.lineTo(cProps.cMarkX, cProps.cMarkY);
        ctx.stroke();
        ctx.setLineDash([]);

        // 前衛の位置
        const depth = parseFloat(depthSlider.value);
        const vY = cProps.netY + (cProps.height * 0.25 * (1-depth));
        const t = (vY - bY) / (cProps.cMarkY - bY);
        const vX = bX + t * (cProps.cMarkX - bX);

        // 前衛（黄）
        ctx.shadowBlur = 15; ctx.shadowColor = "black";
        ctx.fillStyle = "#eccc68";
        ctx.beginPath(); ctx.arc(vX, vY, 14, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.stroke();

        // 打点（赤）
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#ff4757";
        ctx.beginPath(); ctx.arc(bX, bY, 16, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.stroke();

        // ガイド文字 "打点をドラッグ"
        ctx.fillStyle = "white";
        ctx.font = "bold 12px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("打点をドラッグ", bX, bY + 35);
    }

    // イベント処理
    canvas.addEventListener('touchstart', (e) => {
        const rect = canvas.getBoundingClientRect();
        const tx = e.touches[0].clientX - rect.left;
        const ty = e.touches[0].clientY - rect.top;
        if(Math.hypot(tx - ballPos.x*canvas.width, ty - ballPos.y*canvas.height) < 50) isDragging = true;
    });

    window.addEventListener('touchmove', (e) => {
        if(!isDragging) return;
        const rect = canvas.getBoundingClientRect();
        ballPos.x = (e.touches[0].clientX - rect.left) / canvas.width;
        ballPos.y = (e.touches[0].clientY - rect.top) / canvas.height;
        ballPos.x = Math.max(0.05, Math.min(0.95, ballPos.x));
        ballPos.y = Math.max(0.05, Math.min(0.48, ballPos.y));
        draw();
    });

    window.addEventListener('touchend', () => isDragging = false);
    
    rangeSlider.addEventListener('input', (e) => {
        const v = parseFloat(e.target.value);
        let text = "標準";
        if(v < 0.3) text = "広い";
        if(v > 0.7) text = "狭い";
        document.getElementById('rangeVal').innerText = text;
        draw();
    });
    depthSlider.addEventListener('input', draw);

    window.addEventListener('resize', resize);
    window.onload = resize;
</script>
</body>
</html>
