<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Soft Tennis Pro Sim V2</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --omni-green: #1e3a2f;
            --line-white: rgba(255, 255, 255, 0.9);
            --ball-red: #ff4757;
            --player-yellow: #eccc68;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: #f8fafc;
            font-family: -apple-system, sans-serif;
            overflow: hidden; touch-action: none;
            display: flex; flex-direction: column; align-items: center;
        }

        #ui-layer {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; padding: 40px 20px; box-sizing: border-box;
            z-index: 10; /* Canvasより上に */
        }

        .label { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; opacity: 0.7; pointer-events: auto; }

        canvas {
            margin-top: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border-radius: 4px;
            touch-action: none;
        }

        .controls-right {
            position: absolute; right: 15px; top: 50%;
            transform: translateY(-50%); pointer-events: auto;
            display: flex; flex-direction: column; align-items: center;
        }

        input[type=range].vertical {
            appearance: slider-vertical; width: 12px; height: 250px;
            background: rgba(255,255,255,0.1); border-radius: 10px;
        }

        .bottom-panel {
            width: 85%; background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px); padding: 15px;
            border-radius: 16px; pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px; /* iPhoneの下部バー対策 */
        }

        input[type=range] { width: 100%; accent-color: var(--player-yellow); }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="label" style="text-align: center;">OPPONENT COURT (DRAG RED DOT)</div>
    
    <div class="controls-right">
        <span class="label" style="margin-bottom:10px;">POSITION</span>
        <input type="range" id="depthSlider" class="vertical" min="0.1" max="0.9" step="0.01" value="0.7">
    </div>

    <div class="bottom-panel">
        <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
            <span class="label">RANGE SPREAD (TO SIDELINES)</span>
            <span id="spreadValue" style="color:var(--player-yellow); font-weight:bold;">1.0x</span>
        </div>
        <input type="range" id="spreadSlider" min="0.5" max="1.5" step="0.01" value="1.0">
    </div>
</div>

<canvas id="mainCanvas"></canvas>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const depthSlider = document.getElementById('depthSlider');
    const spreadSlider = document.getElementById('spreadSlider');

    // コート設定 (比率)
    const ratio = 1.6; 
    let cProps = {}; // コートの描画プロパティ

    // 状態管理
    let ballPos = { x: 0.85, y: 0.15 }; 
    let isDragging = false;

    function resize() {
        const w = window.innerWidth * 0.9;
        canvas.width = w;
        canvas.height = w * ratio;
        calculateCourtProps();
        draw();
    }

    // コートの各ラインの座標を計算して保存
    function calculateCourtProps() {
        const w = canvas.width;
        const h = canvas.height;
        const padX = w * 0.08; // 横の余白
        const padY = h * 0.08; // 縦の余白
        const cw = w - (padX * 2); // コート有効幅
        const ch = h - (padY * 2); // コート有効高
        const sPad = cw * 0.13; // シングルス用余白

        cProps = {
            width: w, height: h,
            left: padX, right: w - padX,
            top: padY, bottom: h - padY,
            netY: h / 2,
            sLeft: padX + sPad, sRight: w - padX - sPad, // シングルス端
            cMarkX: w / 2,
            cMarkY: h - padY * 0.5 // センターマーク（少し内側）
        };
    }

    function drawCourt() {
        // コートの地肌（グラデーション）
        const grad = ctx.createRadialGradient(cProps.width/2, cProps.height/2, 0, cProps.width/2, cProps.height/2, cProps.height);
        grad.addColorStop(0, '#2d5a3f');
        grad.addColorStop(1, '#1e3a2f');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, cProps.width, cProps.height);

        // 芝生感を出すためのノイズ（簡易版）
        ctx.globalAlpha = 0.03;
        for(let i=0; i<400; i++) {
            ctx.fillStyle = "white";
            ctx.fillRect(Math.random()*cProps.width, Math.random()*cProps.height, 1, 1);
        }
        ctx.globalAlpha = 1.0;

        // ライン設定
        ctx.strokeStyle = "rgba(255, 255, 255, 0.9)";
        ctx.lineWidth = 2.5;

        // ダブルス外枠
        ctx.strokeRect(cProps.left, cProps.top, cProps.right - cProps.left, cProps.bottom - cProps.top);
        
        // シングルスサイドライン
        ctx.beginPath();
        ctx.moveTo(cProps.sLeft, cProps.top); ctx.lineTo(cProps.sLeft, cProps.bottom);
        ctx.moveTo(cProps.sRight, cProps.top); ctx.lineTo(cProps.sRight, cProps.bottom);
        ctx.stroke();

        // ネット
        ctx.beginPath();
        ctx.lineWidth = 4;
        ctx.moveTo(0, cProps.netY); ctx.lineTo(cProps.width, cProps.netY);
        ctx.stroke();

        // サービスライン
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(cProps.sLeft, cProps.height*0.28); ctx.lineTo(cProps.sRight, cProps.height*0.28);
        ctx.moveTo(cProps.sLeft, cProps.height*0.72); ctx.lineTo(cProps.sRight, cProps.height*0.72);
        // センターライン
        ctx.moveTo(cProps.width/2, cProps.height*0.28); ctx.lineTo(cProps.width/2, cProps.height*0.72);
        ctx.stroke();
    }

    function draw() {
        const w = canvas.width;
        const h = canvas.height;
        ctx.clearRect(0, 0, w, h);

        drawCourt();

        const bX = ballPos.x * w;
        const bY = ballPos.y * h;

        // --- ここから守備範囲の計算 ---
        const spreadFactor = parseFloat(spreadSlider.value); // スライダーの倍率

        // 1. 基本となる「コート端」のターゲット座標（自陣のボトムライン上）
        let targetLeftX = cProps.sLeft;  // シングルス左端
        let targetRightX = cProps.sRight; // シングルス右端

        // 2. 打点がセンターからどれだけ離れているか（比率：0〜1）
        const offsetRatio = Math.abs(bX - cProps.cMarkX) / (cProps.sRight - cProps.cMarkX);

        // 3. スライダーの倍率と打点オフセットを組み合わせて、範囲を調整
        // 打点がワイドに出るほど、範囲の広がりも大きくなるように計算
        const finalSpread = (targetRightX - cProps.cMarkX) * offsetRatio * spreadFactor;

        // 実際のターゲット座標を計算（センターから左右にfinalSpread分広げる）
        const actualTargetLeftX = cProps.cMarkX - finalSpread;
        const actualTargetRightX = cProps.cMarkX + finalSpread;

        // --- 描画 ---
        // 打球範囲（扇形）
        ctx.shadowBlur = 0;
        ctx.fillStyle = "rgba(255, 71, 87, 0.25)";
        ctx.beginPath();
        ctx.moveTo(bX, bY);
        // 打点から、計算した自陣ボトムライン上の左右ターゲットに向けて線を引く
        ctx.lineTo(actualTargetLeftX, cProps.bottom);
        ctx.lineTo(actualTargetRightX, cProps.bottom);
        ctx.fill();

        // セオリーライン（点線：打点⇔自陣センターマーク）
        ctx.setLineDash([8, 8]);
        ctx.strokeStyle = "rgba(255,255,255,0.4)";
        ctx.beginPath();
        ctx.moveTo(bX, bY);
        ctx.lineTo(cProps.cMarkX, cProps.cMarkY);
        ctx.stroke();
        ctx.setLineDash([]);

        // 前衛の計算（セオリーライン上）
        const depth = parseFloat(depthSlider.value);
        // ネットから少し手前で動くように調整
        const vY = cProps.netY + (cProps.height * 0.25 * (1-depth));
        const t = (vY - bY) / (cProps.cMarkY - bY);
        const vX = bX + t * (cProps.cMarkX - bX);

        // 影の描写（立体感）
        ctx.shadowBlur = 15;
        ctx.shadowColor = "black";

        // 前衛（黄）
        ctx.fillStyle = "#eccc68";
        ctx.beginPath(); ctx.arc(vX, vY, 14, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.stroke();

        // 打点（赤）
        ctx.shadowBlur = 0; // 打点は影なしでシャープに
        ctx.fillStyle = "#ff4757";
        ctx.beginPath(); ctx.arc(bX, bY, 16, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.stroke();
    }

    // --- イベント処理 ---
    canvas.addEventListener('touchstart', (e) => {
        const rect = canvas.getBoundingClientRect();
        const tx = e.touches[0].clientX - rect.left;
        const ty = e.touches[0].clientY - rect.top;
        // 打点の近くを触ったらドラッグ開始（判定を少し大きく）
        if(Math.hypot(tx - ballPos.x*canvas.width, ty - ballPos.y*canvas.height) < 40) isDragging = true;
    });

    window.addEventListener('touchmove', (e) => {
        if(!isDragging) return;
        const rect = canvas.getBoundingClientRect();
        ballPos.x = (e.touches[0].clientX - rect.left) / canvas.width;
        ballPos.y = (e.touches[0].clientY - rect.top) / canvas.height;
        // 相手コート内に制限（シングルスサイドラインを基準に）
        ballPos.x = Math.max(0.05, Math.min(0.95, ballPos.x));
        ballPos.y = Math.max(0.05, Math.min(0.48, ballPos.y));
        draw();
    });

    window.addEventListener('touchend', () => isDragging = false);
    depthSlider.addEventListener('input', draw);
    spreadSlider.addEventListener('input', (e) => {
        document.getElementById('spreadValue').innerText = e.target.value + 'x';
        draw();
    });

    window.addEventListener('resize', resize);
    window.onload = resize;
</script>
</body>
</html>
