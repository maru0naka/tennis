<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tennis Position Sim</title>
    <style>
        :root {
            --bg-color: #1a1c2c;
            --court-green: #2d5a3f;
            --line-white: rgba(255, 255, 255, 0.8);
            --accent-red: #ff5e5e;
            --accent-yellow: #ffcf5e;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        canvas {
            background-color: var(--court-green);
            border: 2px solid var(--line-white);
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 100%;
            touch-action: none;
        }

        .controls-right {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        input[type=range].vertical {
            writing-mode: bt-lr; /* Webkit */
            appearance: slider-vertical;
            width: 8px;
            height: 200px;
            padding: 0 5px;
        }

        .controls-bottom {
            width: 90%;
            margin-top: 20px;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
        }

        .label { font-size: 12px; margin-bottom: 5px; opacity: 0.8; }
        .value-display { float: right; color: var(--accent-yellow); font-weight: bold; }
    </style>
</head>
<body>

<div id="app-container">
    <div style="margin-bottom: 10px; font-size: 14px;">相手コート (奥)</div>
    
    <canvas id="courtCanvas"></canvas>

    <div class="controls-right">
        <span style="font-size: 10px;">▲ 前</span>
        <input type="range" id="depthSlider" class="vertical" min="0.1" max="0.9" step="0.01" value="0.6">
        <span style="font-size: 10px;">▼ 後</span>
    </div>

    <div class="controls-bottom">
        <div class="label">打球範囲の広さ <span id="angleValue" class="value-display">13°</span></div>
        <input type="range" id="angleSlider" style="width: 100%;" min="5" max="45" value="13">
    </div>

    <div style="margin-top: 10px; font-size: 14px;">自陣コート (手前)</div>
</div>

<script>
    const canvas = document.getElementById('courtCanvas');
    const ctx = canvas.getContext('2d');
    const depthSlider = document.getElementById('depthSlider');
    const angleSlider = document.getElementById('angleSlider');
    const angleValue = document.getElementById('angleValue');

    // コート設定 (比率)
    const ratio = 1.4; 
    let width, height;

    // 状態管理
    let ballPos = { x: 0.8, y: 0.15 }; // 相手の打点 (0~1)
    let isDragging = false;

    function init() {
        // iPhoneの画面サイズに合わせる
        const containerWidth = window.innerWidth * 0.8;
        width = containerWidth;
        height = width * ratio;
        canvas.width = width;
        canvas.height = height;
        draw();
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);

        // 1. コートのライン描画
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        // 外枠
        ctx.strokeRect(width*0.1, height*0.1, width*0.8, height*0.8);
        // ネット
        ctx.beginPath();
        ctx.moveTo(0, height/2); ctx.lineTo(width, height/2);
        ctx.stroke();
        // サービスライン
        ctx.beginPath();
        ctx.moveTo(width*0.1, height*0.25); ctx.lineTo(width*0.9, height*0.25);
        ctx.moveTo(width*0.1, height*0.75); ctx.lineTo(width*0.9, height*0.75);
        ctx.moveTo(width/2, height*0.25); ctx.lineTo(width/2, height*0.75);
        ctx.stroke();

        const bX = ballPos.x * width;
        const bY = ballPos.y * height;
        const centerMarkX = width / 2;
        const centerMarkY = height * 0.9;

        // 2. 打球可能範囲 (扇形)
        const angle = angleSlider.value * Math.PI / 180;
        ctx.fillStyle = 'rgba(255, 94, 94, 0.2)';
        ctx.beginPath();
        ctx.moveTo(bX, bY);
        // 簡易的な扇形描画
        ctx.lineTo(bX - Math.sin(angle)*height, height);
        ctx.lineTo(bX + Math.sin(angle)*height, height);
        ctx.fill();

        // 3. セオリーライン (点線)
        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.beginPath();
        ctx.moveTo(bX, bY);
        ctx.lineTo(centerMarkX, centerMarkY);
        ctx.stroke();
        ctx.setLineDash([]);

        // 4. 前衛の位置計算
        const depth = parseFloat(depthSlider.value);
        const netY = height / 2;
        const volleyerY = netY + (height * 0.2 * (1 - depth)); // ネット付近で動く
        
        // セオリーライン上のX座標を計算 (線形補間)
        const t = (volleyerY - bY) / (centerMarkY - bY);
        const volleyerX = bX + t * (centerMarkX - bX);

        // 5. 前衛 (黄丸)
        ctx.shadowBlur = 10; ctx.shadowColor = 'yellow';
        ctx.fillStyle = '#ffcf5e';
        ctx.beginPath();
        ctx.arc(volleyerX, volleyerY, 12, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;
        // 外枠
        ctx.strokeStyle = 'white';
        ctx.beginPath();
        ctx.arc(volleyerX, volleyerY, 15, 0, Math.PI*2);
        ctx.stroke();

        // 6. 打点 (赤丸)
        ctx.fillStyle = '#ff5e5e';
        ctx.beginPath();
        ctx.arc(bX, bY, 15, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = 'white';
        ctx.stroke();
    }

    // タッチイベント処理
    canvas.addEventListener('touchstart', (e) => {
        const rect = canvas.getBoundingClientRect();
        const touchX = e.touches[0].clientX - rect.left;
        const touchY = e.touches[0].clientY - rect.top;
        // 打点の近くを触ったらドラッグ開始
        const dist = Math.hypot(touchX - ballPos.x*width, touchY - ballPos.y*height);
        if(dist < 30) isDragging = true;
    });

    window.addEventListener('touchmove', (e) => {
        if(!isDragging) return;
        const rect = canvas.getBoundingClientRect();
        ballPos.x = (e.touches[0].clientX - rect.left) / width;
        ballPos.y = (e.touches[0].clientY - rect.top) / height;
        // 相手コート内に制限
        ballPos.y = Math.max(0.05, Math.min(0.45, ballPos.y));
        draw();
    });

    window.addEventListener('touchend', () => isDragging = false);
    depthSlider.addEventListener('input', draw);
    angleSlider.addEventListener('input', () => {
        angleValue.innerText = angleSlider.value + '°';
        draw();
    });

    window.onload = init;
</script>

</body>
</html>
